<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>OmegaHR | Audit Log Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-gray-100 font-sans">
    <div class="container mx-auto p-6">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-blue-400"><i class="fas fa-shield-halved mr-3"></i>Auditní Systém</h1>
            <div class="flex gap-4">
                <input type="text" id="searchInput" placeholder="Hledat v logech..." class="bg-gray-800 border border-gray-700 rounded px-4 py-2 focus:outline-none focus:border-blue-500">
                <select id="categoryFilter" class="bg-gray-800 border border-gray-700 rounded px-4 py-2">
                    <option value="">Všechny kategorie</option>
                    <option value="HR">HR Operace</option>
                    <option value="Bezpečnost">Bezpečnost</option>
                    <option value="Systém">Systém</option>
                </select>
            </div>
        </div>

        <div class="bg-gray-800 rounded-lg shadow-xl overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-700 text-blue-300 uppercase text-sm">
                        <th class="p-4">Čas</th>
                        <th class="p-4">Uživatel</th>
                        <th class="p-4">Kategorie</th>
                        <th class="p-4">Akce</th>
                        <th class="p-4">Detaily</th>
                    </tr>
                </thead>
                <tbody id="auditBody">
                    {% for entry in logs|reverse %}
                    <tr class="border-b border-gray-700 hover:bg-gray-750 transition-colors audit-row">
                        <td class="p-4 text-gray-400 text-sm">{{ entry.timestamp }}</td>
                        <td class="p-4 font-medium">{{ entry.user }}</td>
                        <td class="p-4">
                            <span class="px-2 py-1 rounded text-xs font-bold
                                {% if entry.category == 'HR' %}bg-green-900 text-green-300
                                {% elif entry.category == 'Bezpečnost' %}bg-red-900 text-red-300
                                {% elif entry.category == 'Systém' %}bg-blue-900 text-blue-300
                                {% else %}bg-gray-600 text-gray-200{% endif %}">
                                {{ entry.category }}
                            </span>
                        </td>
                        <td class="p-4">{{ entry.action }}</td>
                        <td class="p-4 text-gray-400 italic text-sm">{{ entry.details }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const categoryFilter = document.getElementById('categoryFilter');
        const rows = document.querySelectorAll('.audit-row');

        function filterLogs() {
            const searchTerm = searchInput.value.toLowerCase();
            const categoryTerm = categoryFilter.value.toLowerCase();

            rows.forEach(row => {
                const text = row.innerText.toLowerCase();
                const category = row.querySelector('span').innerText.toLowerCase();
                const matchesSearch = text.includes(searchTerm);
                const matchesCategory = categoryTerm === "" || category.includes(categoryTerm);
                
                row.style.display = (matchesSearch && matchesCategory) ? "" : "none";
            });
        }

        searchInput.addEventListener('input', filterLogs);
        categoryFilter.addEventListener('change', filterLogs);
    </script>
</body>
</html>
