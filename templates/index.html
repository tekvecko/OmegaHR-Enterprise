<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>OmegaHR | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-6">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-gray-700 pb-5">
            <h1 class="text-3xl font-bold text-blue-500 italic">OMEGA<span class="text-white">PLATINUM</span></h1>
            <div class="flex gap-4">
                <span class="text-gray-400 self-center">Uživatel: HR Pracovník</span>
                <a href="/logout" class="bg-red-600 px-4 py-2 rounded text-sm hover:bg-red-700">Odhlásit</a>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <a href="/new" class="group block bg-blue-600 p-10 rounded-2xl shadow-2xl transition-all hover:bg-blue-500 border-2 border-transparent hover:border-blue-400">
                <div class="text-5xl mb-4 group-hover:scale-110 transition-transform">➕</div>
                <h2 class="text-2xl font-bold uppercase tracking-wider">Nový Nástup</h2>
                <p class="text-blue-200 mt-2 opacity-80">Evidence nového zaměstnance do systému</p>
            </a>

            <a href="/admin/audit" class="group block bg-gray-800 p-10 rounded-2xl shadow-2xl transition-all hover:bg-gray-700 border-2 border-gray-700">
                <div class="text-5xl mb-4 group-hover:rotate-12 transition-transform">📜</div>
                <h2 class="text-2xl font-bold uppercase tracking-wider text-gray-300">Bezpečnostní Log</h2>
                <p class="text-gray-500 mt-2 opacity-80">Kontrola přístupů a incidentů</p>
            </a>
        </div>
        
        <div class="mt-10 p-4 bg-blue-900/20 border border-blue-800/50 rounded-lg text-center">
            <p class="text-blue-400 text-sm">Systém Omega HR Platinum je v režimu plné certifikace.</p>
        </div>
    </div>
</body>
</html>
