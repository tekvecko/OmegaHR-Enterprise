<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>OmegaHR | Nový Nábor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-10">
    <div class="max-w-md mx-auto bg-gray-800 p-8 rounded-lg shadow-2xl">
        <h2 class="text-2xl font-bold mb-6 text-blue-400 text-center">Nový Zaměstnanec</h2>
        <form action="/new" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm">Jméno</label>
                <input type="text" name="name" class="w-full bg-gray-700 p-2 rounded" required>
            </div>
            <div>
                <label class="block text-sm">Příjmení</label>
                <input type="text" name="surname" class="w-full bg-gray-700 p-2 rounded" required>
            </div>
            <div>
                <label class="block text-sm">Email</label>
                <input type="email" name="email" class="w-full bg-gray-700 p-2 rounded" required>
            </div>
            <div>
                <label class="block text-sm">Pozice</label>
                <input type="text" name="position" class="w-full bg-gray-700 p-2 rounded" value="Developer">
            </div>
            <div>
                <label class="block text-sm">Plat (CZK)</label>
                <input type="number" name="salary" class="w-full bg-gray-700 p-2 rounded" value="50000">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded font-bold transition">
                ZAPSAT DO SYSTÉMU
            </button>
        </form>
        <div class="mt-4 text-center">
            <a href="/" class="text-gray-400 hover:text-white text-sm">← Zpět na Dashboard</a>
        </div>
    </div>
</body>
</html>
