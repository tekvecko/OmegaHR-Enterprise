<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>OMEGA | Nový nábor</title>
    <style>
        body { background: #0a0a0a; color: #eee; font-family: sans-serif; margin: 0; padding: 50px; }
        .form-container { max-width: 600px; margin: 0 auto; background: #111; padding: 40px; border-radius: 10px; border: 1px solid #333; }
        h2 { color: #3498db; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        label { display: block; margin-bottom: 5px; color: #888; font-size: 0.8rem; }
        input { width: 100%; padding: 10px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 4px; box-sizing: border-box; margin-bottom: 15px; }
        .actions { margin-top: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: #3498db; color: white; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .back { color: #666; text-decoration: none; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>REGISTRACE NOVÉHO ZAMĚSTNANCE</h2>
        <form method="post">
            <div class="grid">
                <div>
                    <label>JMÉNO</label>
                    <input name="name" placeholder="Emanuel" required>
                </div>
                <div>
                    <label>PŘÍJMENÍ</label>
                    <input name="surname" placeholder="Konečný" required>
                </div>
            </div>
            <label>EMAIL</label>
            <input name="email" type="email" placeholder="e.konecny@omega.cz" required>
            <div class="grid">
                <div>
                    <label>POZICE</label>
                    <input name="position" placeholder="Senior Developer" required>
                </div>
                <div>
                    <label>NÁSTUPNÍ PLAT (CZK)</label>
                    <input name="salary" type="number" placeholder="85000" required>
                </div>
            </div>
            <div class="actions">
                <a href="/" class="back">← ZPĚT NA DASHBOARD</a>
                <button type="submit" class="btn">POTVRDIT NÁBOR</button>
            </div>
        </form>
    </div>
</body>
</html>
