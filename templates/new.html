{% extends 'layout.html' %}
{% block content %}
<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>OMEGA | New Personnel</title>
    <style>
        body { background: #05080a; color: #e0e6ed; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #0d1216; padding: 30px; border-radius: 12px; border: 1px solid #1a2228; width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #1a2228; border: 1px solid #2d3843; color: white; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; background: #00d2ff; border: none; color: black; font-weight: bold; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="margin-top:0">Nový Člen</h2>
        <form method="POST">
            <input type="text" name="name" placeholder="Celé jméno (vč. diakritiky)" required>
            <input type="text" name="token" placeholder="Token (např. T-100)">
            <input type="text" name="mojeid" placeholder="MojeID Identifikátor">
            <button type="submit" class="btn">ZAREGISTROVAT</button>
        </form>
        <p><a href="/" style="color:#666; font-size:0.8rem; text-decoration:none;">← Zpět</a></p>
    </div>
</body>

{% endblock %}
