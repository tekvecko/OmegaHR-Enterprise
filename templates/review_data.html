{% extends "base.html" %}
{% block content %}
<div class="pt-8">
    <div class="text-center mb-8">
        <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-3xl mx-auto mb-4"><i class="ri-shield-check-fill"></i></div>
        <h1 class="text-2xl font-bold text-brand-dark mb-2">Data Received</h1>
        <p class="text-gray-500 text-sm">Review data from Identity Provider ({{ data.source }}).</p>
    </div>
    <div class="bg-white p-6 rounded-3xl shadow-sm mb-8 space-y-5">
        <div>
            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">Verified Name</label>
            <div class="font-bold text-lg text-gray-800">{{ data.name }}</div>
        </div>
        <div class="border-t border-gray-100 pt-4">
            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">Date of Birth</label>
            <div class="font-bold text-lg text-gray-800">{{ data.birthdate }}</div>
        </div>
    </div>
    <form action="/auth/confirm_data" method="POST">
        <button class="w-full bg-brand-dark text-brand-gold py-4 rounded-xl font-bold text-lg shadow-xl active:scale-95 transition">Agree & Sign Contract</button>
    </form>
</div>
{% endblock %}
