<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>OMEGA | Přihlášení</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #111; padding: 3rem; border-radius: 15px; border: 1px solid #333; width: 320px; box-shadow: 0 20px 50px rgba(0,0,0,0.7); text-align: center; }
        h1 { color: #3498db; margin-bottom: 0.5rem; }
        p { color: #555; margin-bottom: 2rem; font-size: 0.9rem; }
        input { width: 100%; padding: 12px; margin-bottom: 1rem; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; }
        input:focus { border-color: #3498db; outline: none; }
        button { width: 100%; padding: 12px; background: #3498db; border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2980b9; box-shadow: 0 0 15px rgba(52,152,219,0.4); }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>OMEGA<span style="color:white">HR</span></h1>
        <p>SECURE ACCESS ONLY</p>
        <form method="post">
            <input name="username" placeholder="Uživatelské jméno" required autofocus>
            <input name="password" type="password" placeholder="Heslo" required>
            <button type="submit">VSTOUPIT DO SYSTÉMU</button>
        </form>
    </div>
</body>
</html>
