<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config={theme:{extend:{fontFamily:{sans:['"Plus Jakarta Sans"','sans-serif'],serif:['"Playfair Display"','serif']},colors:{brand:{gold:'#C5A572',dark:'#121212',surface:'#1E1E1E'}}}}}
    </script>
</head>
<body class="bg-brand-dark text-white h-screen flex flex-col items-center justify-center p-8 relative overflow-hidden">
    <div class="absolute top-0 right-0 w-64 h-64 bg-brand-gold blur-[120px] opacity-20 rounded-full"></div>
    <div class="w-full max-w-md z-10">
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-brand-gold rounded-2xl flex items-center justify-center text-brand-dark text-3xl font-bold mx-auto mb-4">Ω</div>
            <h1 class="font-serif text-3xl">OmegaHR</h1>
            <p class="text-gray-400 text-sm mt-2">Enterprise Management</p>
        </div>
        <div class="bg-brand-surface p-8 rounded-3xl border border-white/5 shadow-2xl">
            <form action="/auth/internal" method="POST" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-brand-gold uppercase tracking-wider mb-2">Username</label>
                    <input type="text" name="username" class="w-full bg-brand-dark border border-white/10 rounded-xl py-3 px-4 text-white outline-none focus:border-brand-gold">
                </div>
                <div>
                    <label class="block text-xs font-bold text-brand-gold uppercase tracking-wider mb-2">Password</label>
                    <input type="password" name="password" class="w-full bg-brand-dark border border-white/10 rounded-xl py-3 px-4 text-white outline-none focus:border-brand-gold">
                </div>
                <button class="w-full bg-brand-gold text-brand-dark font-bold py-4 rounded-xl shadow-lg mt-4">Login</button>
            </form>
            {% if error %}
                <div class="mt-4 p-3 bg-red-500/10 border border-red-500/20 rounded-lg text-xs text-red-400">Invalid credentials.</div>
            {% endif %}
        </div>
    </div>
</body>
</html>
