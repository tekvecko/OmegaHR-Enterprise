<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Přihlášení - OmegaHR Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center font-sans text-gray-800">
    <div class="bg-white p-8 md:p-10 rounded-3xl shadow-sm max-w-md w-full mx-4 border border-gray-100">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-gray-900 text-white rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 shadow-lg">
                <i class="ri-shield-keyhole-fill"></i>
            </div>
            <h1 class="text-2xl font-black text-gray-900">OmegaHR Enterprise</h1>
            <p class="text-gray-500 text-sm mt-1">Přihlaste se do podnikového systému</p>
        </div>

        <form action="/login" method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">Přihlašovací jméno</label>
                <div class="relative">
                    <i class="ri-user-3-line absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    <input type="text" name="username" required class="w-full bg-gray-50 p-4 pl-11 rounded-xl outline-none border border-gray-100 focus:border-gray-300 transition" placeholder="např. admin">
                </div>
            </div>
            
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">Heslo</label>
                <div class="relative">
                    <i class="ri-lock-password-line absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    <input type="password" name="password" required class="w-full bg-gray-50 p-4 pl-11 rounded-xl outline-none border border-gray-100 focus:border-gray-300 transition" placeholder="••••••••">
                </div>
            </div>

            <button type="submit" class="w-full bg-gray-900 text-white font-bold py-4 rounded-xl hover:bg-black transition shadow-md mt-2 flex justify-center items-center gap-2">
                <i class="ri-login-box-line"></i> Přihlásit se
            </button>
        </form>
    </div>
</body>
</html>
