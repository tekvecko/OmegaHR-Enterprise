<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nastavení Firmy - OmegaHR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans text-gray-800">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl md:text-3xl font-black">Řídící panel Admina</h1>
            <a href="/" class="text-gray-500 hover:text-gray-800 font-bold transition"><i class="ri-arrow-left-line"></i> Zpět na Nástěnku</a>
        </div>

        <div class="flex gap-2 mb-6 border-b border-gray-200 pb-2">
            <a href="/admin/users" class="px-4 py-2 text-gray-500 hover:text-gray-800 font-bold transition rounded-lg hover:bg-gray-50">Správa účtů</a>
            <a href="/admin/settings" class="px-4 py-2 bg-gray-800 text-white font-bold rounded-lg shadow-sm">Nastavení firmy</a>
        </div>
        
        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-100">
            <form action="/admin/settings" method="POST" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">Název společnosti</label>
                        <input type="text" name="company_name" value="{{ settings.company_name }}" required class="w-full bg-gray-50 p-3 rounded-xl outline-none border border-gray-100">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">IČO</label>
                        <input type="text" name="company_id" value="{{ settings.company_id }}" class="w-full bg-gray-50 p-3 rounded-xl outline-none border border-gray-100">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-gray-500 mb-1">Sídlo společnosti (Adresa)</label>
                        <input type="text" name="company_address" value="{{ settings.company_address }}" required class="w-full bg-gray-50 p-3 rounded-xl outline-none border border-gray-100">
                    </div>
                    <div class="md:col-span-2 pt-4 border-t border-gray-50">
                        <label class="block text-xs font-bold text-gray-500 mb-1">Base URL (Zrok adresa pro MojeID)</label>
                        <input type="url" name="base_url" value="{{ settings.base_url }}" class="w-full bg-gray-50 p-3 rounded-xl outline-none border border-gray-100" placeholder="https://...">
                        <p class="text-xs text-gray-400 mt-1">Bez lomítka na konci.</p>
                    </div>
                </div>
                <button type="submit" class="bg-brand-gold text-brand-dark px-6 py-3 rounded-xl font-bold hover:bg-yellow-400 transition w-full md:w-auto mt-4"><i class="ri-save-3-line mr-2"></i>Uložit nastavení</button>
            </form>
        </div>
    </div>
</body>
</html>
