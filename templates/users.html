<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Správa Účtů - OmegaHR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans text-gray-800">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl md:text-3xl font-black">Řídící panel Admina</h1>
            <a href="/dashboard" class="text-gray-500 hover:text-gray-800 font-bold transition"><i class="ri-arrow-left-line"></i> Zpět na Nástěnku</a>
        </div>

        <div class="flex gap-2 mb-6 border-b border-gray-200 pb-2">
            <a href="/admin/users" class="px-4 py-2 bg-gray-800 text-white font-bold rounded-lg shadow-sm">Správa účtů</a>
            <a href="/admin/settings" class="px-4 py-2 text-gray-500 hover:text-gray-800 font-bold transition rounded-lg hover:bg-gray-50">Nastavení firmy</a>
        </div>
        
        <div class="bg-white p-6 rounded-2xl shadow-sm mb-8 border border-gray-100">
            <h2 class="text-sm font-bold mb-4 text-gray-700">Přidat nového uživatele</h2>
            <form action="/admin/users" method="POST" class="flex flex-col md:flex-row gap-4 items-end">
                <input type="hidden" name="action" value="add">
                <div class="flex-1 w-full">
                    <label class="block text-xs font-bold text-gray-500 mb-1">Jméno</label>
                    <input type="text" name="username" required class="w-full bg-gray-50 p-2.5 rounded-xl outline-none border border-gray-100">
                </div>
                <div class="flex-1 w-full">
                    <label class="block text-xs font-bold text-gray-500 mb-1">Heslo</label>
                    <input type="text" name="password" required class="w-full bg-gray-50 p-2.5 rounded-xl outline-none border border-gray-100">
                </div>
                <div class="flex-1 w-full">
                    <label class="block text-xs font-bold text-gray-500 mb-1">Role</label>
                    <select name="role" class="w-full bg-gray-50 p-2.5 rounded-xl outline-none border border-gray-100">
                        <option value="hr">HR Pracovník</option>
                        <option value="admin">Administrátor</option>
                    </select>
                </div>
                <button type="submit" class="bg-gray-800 text-white px-5 py-2.5 rounded-xl font-bold hover:bg-black transition w-full md:w-auto"><i class="ri-user-add-line"></i></button>
            </form>
        </div>

        <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100">
            <table class="w-full text-left">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="p-4 text-xs font-bold text-gray-500 uppercase">Uživatel</th>
                        <th class="p-4 text-xs font-bold text-gray-500 uppercase">Role</th>
                        <th class="p-4 text-xs font-bold text-gray-500 uppercase">Změna hesla</th>
                        <th class="p-4 text-xs font-bold text-gray-500 uppercase">Odstranit</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-50">
                    {% for uname, udata in users.items() %}
                    <tr>
                        <td class="p-4 font-bold text-gray-700">{{ uname }}</td>
                        <td class="p-4">
                            {% if udata.role == 'admin' %}
                            <span class="bg-red-50 text-red-600 px-2 py-1 rounded text-xs font-bold">Admin</span>
                            {% else %}
                            <span class="bg-blue-50 text-blue-600 px-2 py-1 rounded text-xs font-bold">HR</span>
                            {% endif %}
                        </td>
                        <td class="p-4">
                            <form action="/admin/users" method="POST" class="flex items-center gap-2">
                                <input type="hidden" name="action" value="change_password">
                                <input type="hidden" name="username" value="{{ uname }}">
                                <input type="text" name="new_password" placeholder="Nové heslo" required class="w-24 bg-gray-50 border border-gray-200 rounded px-2 py-1 text-xs outline-none focus:border-gray-400">
                                <button type="submit" class="bg-gray-200 text-gray-700 px-2 py-1 rounded text-xs font-bold hover:bg-gray-300 transition">Změnit</button>
                            </form>
                        </td>
                        <td class="p-4">
                            {% if uname != 'admin' %}
                            <form action="/admin/users" method="POST">
                                <input type="hidden" name="action" value="delete">
                                <input type="hidden" name="username" value="{{ uname }}">
                                <button type="submit" class="text-red-400 hover:text-red-600 font-bold transition"><i class="ri-delete-bin-line"></i></button>
                            </form>
                            {% endif %}
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
